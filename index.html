<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Quick Thrills</title>

  <link href="https://fonts.googleapis.com/css2?family=Cedarville+Cursive&family=La+Belle+Aurore&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="paper-grain"></div>

  <main class="container">
    <h1 class="band-name">The Quick Thrills</h1>

    <div class="scribble" aria-hidden="true"></div>

    <h2 class="song-title">
      <span class="money">Money</span>
      <span class="honey">Honey</span>
    </h2>

    <p class="out-now">OUT NOW</p>

    <div class="player">
      <iframe
        style="border-radius:12px"
        src="https://open.spotify.com/embed/track/yourtrackid"
        width="100%"
        height="152"
        frameborder="0"
        allowfullscreen=""
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
      </iframe>
    </div>

    <div class="scribble" aria-hidden="true"></div>

    <div class="buttons">
      <a href="#" class="btn btn-1">Spotify</a>
      <a href="#" class="btn btn-2">Apple Music</a>
      <a href="#" class="btn btn-3">YouTube</a>
      <a href="#" class="btn btn-4">Instagram</a>
    </div>

    <div class="scribble" aria-hidden="true"></div>

    <section class="contact">
      <p><a href="mailto:thequickthrillsband@gmail.com">thequickthrillsband@gmail.com</a></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
