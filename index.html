<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Quick Thrills | Money Honey</title>
  <meta
    name="description"
    content="Listen to Money Honey by The Quick Thrills. Stream on Spotify and Apple Music, follow on Instagram, and contact the band directly."
  />

  <!-- Open Graph -->
  <meta property="og:title" content="The Quick Thrills | Money Honey" />
  <meta
    property="og:description"
    content="Listen to Money Honey by The Quick Thrills. Stream now and follow the band."
  />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="moneyhoney.jpg" />

  <!-- Theme color -->
  <meta name="theme-color" content="#0b1016" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Shrikhand&family=La+Belle+Aurore&display=swap"
    rel="stylesheet"
  />

  <!-- Preload key images -->
  <link rel="preload" href="logo2.png" as="image" />
  <link rel="preload" href="moneyhoney.jpg" as="image" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="site-header">
    <img
      src="logo2.png"
      alt="The Quick Thrills logo"
      class="header-logo"
      width="180"
      height="180"
      loading="eager"
      decoding="async"
    />
  </header>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">A new single from The Quick Thrills</p>
      <h1 class="title">Money Honey</h1>
      <p class="listen">Listen now</p>

      <div class="cover-wrap">
        <img
          src="moneyhoney.jpg"
          alt="Money Honey cover art by The Quick Thrills"
          class="cover-art"
          width="920"
          height="920"
          loading="eager"
          decoding="async"
        />
      </div>

      <div class="buttons">
        <a href="https://open.spotify.com/" class="btn btn-1" target="_blank" rel="noopener noreferrer">Spotify</a>
        <a href="https://music.apple.com/" class="btn btn-2" target="_blank" rel="noopener noreferrer">Apple Music</a>
        <a href="https://instagram.com/" class="btn btn-3" target="_blank" rel="noopener noreferrer">Instagram</a>
      </div>

      <div class="contact">
        <a href="mailto:thequickthrills@proton.me">thequickthrills@proton.me</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
