<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Quick Thrills — Money Honey</title>
  <meta
    name="description"
    content="Listen to Money Honey by The Quick Thrills. Stream on Spotify and Apple Music, follow on Instagram, and contact the band directly."
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Shrikhand&family=La+Belle+Aurore&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <img
      src="logo2.png"
      alt="The Quick Thrills logo"
      class="header-logo"
      loading="eager"
      decoding="async"
    />
  </header>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">A new single from The Quick Thrills</p>
      <p class="listen">Listen to "Money Honey" now</p>

      <div class="cover-wrap">
        <img
          src="moneyhoney.jpg"
          alt="Money Honey cover art by The Quick Thrills"
          class="cover-art"
          loading="eager"
          decoding="async"
        />
      </div>

      <div class="spotify-embed" id="music">
        <iframe
          data-testid="embed-iframe"
          style="border-radius:12px"
          src="https://open.spotify.com/embed/track/4E9sY8fhqzswi2OUnjXy0O?utm_source=generator"
          width="100%"
          height="352"
          frameborder="0"
          allowfullscreen=""
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          title="Money Honey by The Quick Thrills on Spotify"
        ></iframe>
      </div>

      <div class="buttons">
        <a href="https://open.spotify.com/track/4E9sY8fhqzswi2OUnjXy0O?si=a61e740fc85c44fc" class="btn btn-1">Spotify</a>
        <a href="https://music.apple.com/ca/album/money-honey/1892859365?i=6762089769" class="btn btn-2">Apple Music</a>
        <a href="https://www.instagram.com/thequickthrills/?hl=en" class="btn btn-3">Instagram</a>
      </div>

      <div class="contact">
        <a href="mailto:thequickthrills@proton.me" draggable="false">
          thequickthrills@proton.me
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
