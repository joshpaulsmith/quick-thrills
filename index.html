<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Quick Thrills — Money Honey</title>
  <meta
    name="description"
    content="Listen to Money Honey by The Quick Thrills. Stream on Spotify and Apple Music, follow on Instagram, and contact the band directly."
  />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Shrikhand&family=La+Belle+Aurore&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="grain"></div>

  <header class="site-header">
    <img
      src="logo2.png"
      alt="The Quick Thrills logo"
      class="header-logo"
      loading="eager"
      decoding="async"
    />
  </header>

  <main class="page">
    <section class="hero">
      <p class="eyebrow">A new single from The Quick Thrills</p>
      <p class="listen">Listen to "Money Honey" now</p>

      <div class="cover-wrap">
        <img
          src="moneyhoney.jpg"
          alt="Money Honey cover art by The Quick Thrills"
          class="cover-art"
          loading="eager"
          decoding="async"
        />
      </div>

      <div class="buttons">
        <a href="javascript:void(0)" class="btn btn-1">Spotify</a>
        <a href="javascript:void(0)" class="btn btn-2">Apple Music</a>
        <a href="javascript:void(0)" class="btn btn-3">Instagram</a>
      </div>

      <div class="contact">
        <a href="mailto:thequickthrills@proton.me" draggable="false">
          thequickthrills@proton.me
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
